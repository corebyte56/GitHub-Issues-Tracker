<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./assets/favIcon.png">

    <title>GitHub Issues Tracker || Login</title>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">


    <section class="bg-white p-10 rounded-xl w-full max-w-md shadow-none sm:shadow-2xl">


        <div class="flex flex-col items-center space-y-4 mb-6">
            <img src="./assets/github-logo.png" class="w-16" alt="GitHub Logo">

            <div class="text-center">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>
        </div>


        <div class="space-y-5">


            <fieldset class="flex flex-col space-y-2">
                <label class="font-medium text-gray-700">Username</label>
                <input type="text" placeholder="Enter Username"
                    class="border border-gray-300 rounded-lg p-2.5 w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </fieldset>


            <fieldset class="flex flex-col space-y-2">
                <label class="font-medium text-gray-700">Password</label>
                <input type="password" placeholder="Enter Password"
                    class="border border-gray-300 rounded-lg p-2.5 w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
            </fieldset>


            <button class="w-full bg-blue-700 hover:bg-blue-800 text-white py-2.5 rounded-lg font-semibold transition">
                Sign In
            </button>

        </div>

    </section>
</body>

</html>
