<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./assets/favIcon.png">

    <title>GitHub Issues Tracker || Home</title>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <nav
        class="flex flex-col sm:flex-row sm:gap-0 gap-5 justify-between px-4 sm:px-8 lg:px-20 py-3 items-center bg-white shadow-md sticky top-0 z-10">
        <div class="flex gap-2 items-center">
            <img class="w-10 h-10 sm:w-14 sm:h-14" src="./assets/github-logo.png" alt="GitHub Logo">
            <h1 class="sm:text-2xl text-[20px] font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2 items-center">
            <label class="input w-full sm:w-auto flex items-center gap-2">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary hover:btn-outline text-sm sm:text-base"><i class="fa-solid fa-plus"></i> new
                Issue</button>
        </div>
    </nav>

    <section
        class="mb-6 flex flex-wrap gap-2 sm:justify-start justify-center p-4 sm:p-8 mt-6 sm:mt-12 shadow-md rounded-lg container mx-auto bg-white">

        <button  id="all-filter-btn" class="bg-[#4A00FF] border border-gray-200 rounded-lg text-white px-8 py-2 cursor-pointer transition-all duration-300 ease-in-out 
                hover:shadow-2xl hover:-translate-y-1 hover:scale-105">
            All
        </button>

        <button onclick="toggleButton()" id="open-filter-btn" class="bg-white border border-gray-200 rounded-lg text-[#64748B] px-8 py-2 cursor-pointer transition-all duration-300 ease-in-out 
                hover:shadow-2xl hover:-translate-y-1 hover:scale-105">
            Open
        </button>

        <button onclick="toggleButton()" id="closed-filter-btn" class="bg-white border border-gray-200 rounded-lg text-[#64748B] px-8 py-2 cursor-pointer transition-all duration-300 ease-in-out 
                hover:shadow-2xl hover:-translate-y-1 hover:scale-105">
            Closed</button>
    </section>

    <main class="bg-[#FBFBFB] shadow-2xl container mx-auto rounded-lg">
        <section
            class="flex flex-wrap gap-2 sm:justify-between justify-center p-4 sm:p-8 mt-6 sm:mt-12 shadow-md rounded-lg container mx-auto bg-white">
            <div class="flex gap-4 items-center">
                <div class="border-8 border-[#ECE4FF] rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="space-y-2">
                    <h2 class="text-xl font-semibold"><span id="total-issue">0</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <p class="flex items-center text-[#64748B]">
                    <span class="bg-green-500 w-3 h-3 rounded-full inline-block mr-2"></span>
                    Open
                </p>
                <p class="text-[#64748B]"><span class="bg-purple-500 w-3 h-3 rounded-full inline-block mr-2"></span>
                    Closed
                </p>
            </div>
        </section>

        <!-- Issue cards will be dynamically inserted here -->
        <section id="all-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-7 sm:p-10">

            <!-- Card -->

        </section>
    </main>



    <SCript src="./scripts/home.js"></SCript>
</body>

</html>
